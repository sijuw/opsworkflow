services:

  opsflow-api:
    build:
      context: .
      dockerfile: Dockerfile



    ports:
      - "8001:8000"

    env_file:
      - .env.docker

    restart: unless-stopped

  opsflow-ui:
    build:
      context: ./frontend
      dockerfile: Dockerfile


    ports:
      - "3000:80"

    depends_on:
      - opsflow-api

    restart: unless-stopped